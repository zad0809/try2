<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打磚塊遊戲</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>打磚塊遊戲 (Breakout)</h1>

  <script src="game.js"></script>
